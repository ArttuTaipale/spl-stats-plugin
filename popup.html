<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 360px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
      color: #1a1a1a;
    }
    .match-info {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .match-info .teams {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .match-info .score {
      font-size: 20px;
      font-weight: 700;
      color: #1a73e8;
      margin-bottom: 4px;
    }
    .match-info .meta {
      font-size: 12px;
      color: #666;
    }
    .no-match {
      text-align: center;
      padding: 24px 0;
      color: #888;
    }
    .no-match p {
      margin: 8px 0;
    }
    .no-match .hint {
      font-size: 12px;
      color: #aaa;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.primary {
      background: #1a73e8;
      color: white;
    }
    button.primary:hover {
      background: #1557b0;
    }
    button.secondary {
      background: #e8e8e8;
      color: #333;
      margin-top: 8px;
      font-size: 12px;
    }
    button.secondary:hover {
      background: #d0d0d0;
    }
    .player-count {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <h1>⚽ SPL Stats Exporter</h1>

  <div id="no-match" class="no-match">
    <p>No match data intercepted</p>
    <p class="hint">Browse a match page on spl.torneopal.net<br>that triggers a getMatch API call</p>
  </div>

  <div id="match-panel" style="display:none;">
    <div class="match-info">
      <div class="teams" id="teams"></div>
      <div class="score" id="score"></div>
      <div class="meta" id="meta"></div>
    </div>
    <div class="player-count" id="player-count"></div>
    <button class="primary" id="download-btn">Download Excel</button>
    <button class="secondary" id="clear-btn">Clear</button>
  </div>

  <script src="lib/xlsx.full.min.js"></script>
  <script src="stats.js"></script>
  <script src="excel.js"></script>
  <script src="popup.js"></script>
</body>
</html>
